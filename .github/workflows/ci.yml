name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Phase B Gate 1 — `cargo test --workspace` green on macOS + Linux.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system deps (dbus for keyring)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      # Platform adapter daemon round-trip — Phase B Gate 1 hard requirement.
      # Runs on native macOS (launchd) and native Linux (systemd user).
      - name: Integration test — daemon round-trip
        run: cargo test -p makakoo-platform --test daemon_roundtrip --locked

  # Phase B Gate 1 also requires `cargo check --target x86_64-unknown-redox
  # -p makakoo-core` green (compile-only). If this fails the spec says fall
  # back to limbo/libsql per ARCHITECTURE.md §9 point 5 — don't surprise us
  # in Phase H.
  redox-check:
    name: redox cross-compile (makakoo-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with Redox target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-redox

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-latest-cargo-redox-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-redox-

      - name: cargo check (redox target, compile-only)
        # Expected to potentially fail today on rusqlite's bundled C build —
        # per spec, that failure is informative (triggers the limbo/libsql
        # fallback decision), NOT a CI hard-fail. We run with
        # continue-on-error and surface the output for manual inspection.
        continue-on-error: true
        run: cargo check --target x86_64-unknown-redox -p makakoo-core

  # Clippy — warnings surfaced for review but non-fatal. The workspace
  # has pre-Phase-B clippy debt; a dedicated cleanup sprint will flip
  # this to -D warnings later. Phase B's hard gate is `cargo test
  # --workspace` green, not zero clippy warnings. Scoped-strict clippy
  # runs only on the Phase B deliverable (makakoo-platform).
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: cargo clippy (workspace, informational)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --locked

      # Strict lint gate for the Phase B deliverable. New code must be
      # clippy-clean even while older crates carry debt.
      - name: cargo clippy (makakoo-platform, strict)
        run: cargo clippy -p makakoo-platform --all-targets --locked -- -D warnings
