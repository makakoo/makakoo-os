# distros/sebastian.toml
#
# Sebastian Edition — Harvey's daily-driver distro. Layers on top of `core`
# with the first two pilot-migrated skills from harvey-os: the internal
# caveman-voice bootstrap fragment and the network diagnostic wizard.
# Declares persona = Harvey (default voice is caveman, not factory).
#
# This is the dogfood distro. Every skill/agent Sebastian migrates from
# the legacy Python tree into plugins-core gets added here FIRST, and
# shaken out on the live install before being promoted to `creator` or
# another downstream distro.

[distro]
name = "sebastian"
display_name = "Sebastian Edition (Harvey, the full rig)"
version = "0.1.0"
description = "Harvey's daily-driver install — core + migrated harvey-os skills. Pilot distro for Phase H skill migrations."
license = "MIT"

include = ["core.toml"]

[kernel]
version = "^0.1"

[plugins]
# Phase H/2 pilot migrations from harvey-os/skills/.
"skill-meta-caveman-voice" = { version = "*" }
"skill-system-network"     = { version = "*" }

# Phase H/3 batch 1 — remaining HTE system wizards.
"skill-system-files"       = { version = "*" }
"skill-system-health"      = { version = "*" }
"skill-system-security"    = { version = "*" }

# Phase H/3 batch 2 — first non-system wizards (cross-CLI probe + OpenClaw bridge).
"skill-meta-canary"                       = { version = "*" }
"skill-infrastructure-openclaw-bridge"    = { version = "*" }

[defaults]
voice = "caveman"
persona_name = "Harvey"
pronoun = "he/him"

[post_install]
message = """
Sebastian Edition installed. You now have Makakoo Core + the migrated
harvey-os skills shipped so far:
  - skill-meta-caveman-voice                (bootstrap-fragment, ~63% output-token savings)
  - skill-system-network                    (interactive wizard, 'makakoo skill network')
  - skill-system-files                      (file-manager wizard, 'makakoo skill files')
  - skill-system-health                     (services + machine resources, 'makakoo skill health')
  - skill-system-security                   ('Is this command safe?', 'makakoo skill security')
  - skill-meta-canary                       (cross-CLI honesty probe, 'makakoo skill canary')
  - skill-infrastructure-openclaw-bridge    (Harvey↔OpenClaw delegation, 'makakoo skill openclaw-bridge')

Persona locked to: Harvey (voice=caveman, pronoun=he/him).

Phase H/3 batch 2. Remaining harvey-os skills + agents migrate in
later H/3 batches.
"""
