# Generated by `makakoo adapter gen --template mcp-stdio`.
# Wraps any MCP stdio server binary as one adapter. Call with a plain
# prompt to invoke its `chat` tool (if any), or pass a JSON envelope
# `{"tool":"<name>","arguments":{...}}` to fan out to a specific tool.

[adapter]
name            = "{{name}}"
version         = "0.1.0"
manifest_schema = 1
description     = "{{description}}"

[compatibility]
bridge_version = "^2.0"
protocols      = ["mcp-stdio"]

[transport]
kind    = "mcp-stdio"
command = [{{command_argv}}]

[auth]
scheme = "none"

[output]
format        = "openai-chat"
verdict_field = "result.content.0.text"

[capabilities]
features       = ["tool_use"]
supports_roles = [{{roles}}]

[install]
source_type = "local"

[security]
requires_network    = false
requires_filesystem = ["read:cwd"]
sandbox_profile     = "network-io"
