# Generated by `makakoo adapter gen --template openai-compat`.
# Any OpenAI-API-compatible chat-completions endpoint (Mistral, DeepSeek,
# Together, Groq, Anthropic's /messages via shim, Ollama, vLLM, llama.cpp
# server — anything that speaks POST /v1/chat/completions).

[adapter]
name            = "{{name}}"
version         = "0.1.0"
manifest_schema = 1
description     = "{{description}}"

[compatibility]
bridge_version = "^2.0"
protocols      = ["openai-chat-v1"]

[transport]
kind     = "openai-compatible"
base_url = "{{url}}"
model    = "{{model}}"

[auth]
scheme  = "bearer"
key_env = "{{key_env}}"

[output]
format        = "openai-chat"
verdict_field = "choices.0.message.content"

[capabilities]
features       = []
supports_roles = [{{roles}}]

[install]
source_type = "local"

[security]
requires_network    = true
allowed_hosts       = ["{{host}}"]
requires_env        = ["{{key_env}}"]
sandbox_profile     = "network-io"
