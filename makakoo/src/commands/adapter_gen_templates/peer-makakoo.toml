# Generated by `makakoo adapter gen --template peer-makakoo`.
# Targets another Makakoo install running `makakoo-mcp --http`. Uses the
# v0.6 `mcp-http-signed` transport (Ed25519 over sha256(body||ts)). The
# user is responsible for the underlying network (Tailscale / SSH tunnel
# / Cloudflare Tunnel / LAN) and any reverse-proxy TLS.
#
# Prerequisites for this adapter to work:
#   1. The peer is running `makakoo-mcp --http <addr>:<port>`.
#   2. The peer's trust file contains your pubkey under the `peer_name`
#      below. Get your pubkey with `makakoo adapter self-pubkey` and
#      tell the peer to `makakoo adapter trust add <peer_name> <pubkey>`.
#   3. `MAKAKOO_PEER_SIGNING_KEY` env OR the default
#      `$MAKAKOO_HOME/config/peers/signing.key` is present (auto-
#      created by `makakoo adapter self-pubkey` or first `--http` run).

[adapter]
name            = "{{name}}"
version         = "0.1.0"
manifest_schema = 1
description     = "{{description}}"

[compatibility]
bridge_version = "^2.0"
protocols      = ["mcp-http"]

[transport]
kind      = "mcp-http-signed"
url       = "{{url}}/rpc"
peer_name = "{{peer_name}}"

[auth]
scheme = "none"

[output]
format        = "openai-chat"
verdict_field = "result.content.0.text"

[capabilities]
features       = ["tool_use"]
supports_roles = [{{roles}}]

[install]
source_type = "local"

[security]
requires_network    = true
allowed_hosts       = ["{{host}}"]
sandbox_profile     = "network-io"
