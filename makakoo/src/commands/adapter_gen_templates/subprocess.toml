# Generated by `makakoo adapter gen --template subprocess`.
# Any CLI that reads a prompt on stdin and writes a response to stdout.
# Exit-code 0 = ok. Plain-text output format by default; switch to
# `openai-chat` + `verdict_field` if the CLI emits structured JSON.

[adapter]
name            = "{{name}}"
version         = "0.1.0"
manifest_schema = 1
description     = "{{description}}"

[compatibility]
bridge_version = "^2.0"
protocols      = ["custom"]

[transport]
kind    = "subprocess"
command = [{{command_argv}}]
stdin   = true

[auth]
scheme = "none"

[output]
format = "plain"

[capabilities]
features       = []
supports_roles = [{{roles}}]

[install]
source_type = "local"

[security]
requires_network    = false
requires_filesystem = ["read:cwd"]
sandbox_profile     = "isolated"
