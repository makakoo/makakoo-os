# Tytus private AI pod — OpenAI-compatible gateway at the stable WireGuard
# peer address `10.42.42.1:18080`. The key and URL come from `tytus env`; the
# user exports them into the environment before invoking lope / swarm.

[adapter]
name            = "tytus-pod"
version         = "0.1.0"
manifest_schema = 1
description     = "Tytus private AI pod (WireGuard-tunneled OpenAI-compat gateway)"
homepage        = "https://traylinx.com/tytus"
license         = "MIT"
authors         = ["Traylinx <ops@traylinx.com>"]

[compatibility]
bridge_version = "^2.0"
protocols      = ["openai-chat-v1"]

[transport]
kind     = "openai-compatible"
base_url = "http://10.42.42.1:18080/v1"
model    = "ail-compound"

[auth]
scheme  = "bearer"
key_env = "OPENAI_API_KEY"

[output]
format        = "openai-chat"
verdict_field = "choices.0.message.content"

[capabilities]
models         = ["ail-compound", "ail-image", "ail-embed", "minimax/ail-compound"]
features       = ["tool_use", "streaming", "vision"]
max_context    = 200000
rate_limit_rpm = 600
supports_roles = ["validator", "delegate", "swarm_member"]

[install]
source_type = "git"
source      = "https://github.com/traylinx/tytus-adapter.git"
ref         = "v0.1.0"

[security]
requires_network = true
allowed_hosts    = ["10.42.42.1"]
requires_env     = ["OPENAI_API_KEY", "OPENAI_BASE_URL"]
sandbox_profile  = "network-io"
signed_by        = "traylinx"

[health]
check_url      = "http://10.42.42.1:18080/v1/models"
timeout_ms     = 5000
expected_field = "data.0.id"
