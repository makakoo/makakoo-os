[plugin]
name = "agent-dreams"
version = "0.1.0"
kind = "sancho-task"
language = "python"
summary = "Memory consolidation engine — runs nightly to strengthen the Brain knowledge graph"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/agent-dreams/src"

[abi]
sancho-task = "^1.0"

[depends]
python = ">=3.11"

[entrypoint]
run = "python3 -u plugins/agent-dreams/src/consolidator.py"

[capabilities]
grants = [
  "brain/read",
  "brain/write",
  "llm/chat",
]

[sancho]
tasks = [
  { name = "dream_consolidate", interval = "12h", active_hours = [2, 3, 4] },
]

[state]
dir = "$MAKAKOO_HOME/state/agent-dreams"
retention = "purge_on_uninstall"
