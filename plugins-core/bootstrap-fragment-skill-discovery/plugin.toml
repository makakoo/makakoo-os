[plugin]
name = "bootstrap-fragment-skill-discovery"
version = "0.1.0"
kind = "bootstrap-fragment"
language = "shell"
summary = "Teaches every CLI when to reach for skill_discover — the meta capability-discovery hook"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/bootstrap-fragment-skill-discovery"

[abi]
bootstrap-fragment = "^1.0"

[depends]

[capabilities]
grants = []

# Paired with the `skill_discover` MCP tool handler registered in
# makakoo-mcp/src/handlers/tier_a/skill.rs — the tool is always present
# regardless of which plugins are installed, so no prerequisite
# installation is required. The fragment itself teaches the discipline
# of running `skill_discover` *before* claiming any capability.
[infect.fragments]
default = "fragments/default.md"
