[plugin]
name = "lib-harvey-core"
version = "0.1.0"
kind = "library"
language = "python"
summary = "Transitional Python bundle of the legacy core.* tree (archived as harvey-os 2026-04-20). Carved into focused lib-* plugins in v0.2."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/lib-harvey-core/src"

[depends]
python = ">=3.9"
# Soft Python deps (intentionally not pinned in this manifest because the
# Depends schema only carries name lists, not version specs):
#   - cryptography >=41,<46 — Octopus Phase 1 signed-MCP peer federation
#     (Ed25519 signing/verification + invite handshakes on the HTTP shim).
#   - zeroconf >=0.132 (optional) — Octopus Phase 3 mDNS discovery
#     (_makakoo-peer._tcp.). Soft-imported in core/octopus/discovery/mdns.py
#     so the rest of the octopus stack works on machines without the
#     zeroconf runtime (pods often drop it; invite-link onboarding is
#     the fallback).

[capabilities]
grants = []
