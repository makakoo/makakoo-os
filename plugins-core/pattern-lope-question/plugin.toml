[plugin]
name = "pattern-lope-question"
version = "0.1.0"
kind = "pattern"
language = "shell"
summary = "Refine a hand-typed question into a tight, validator-ready prompt for `lope ask`."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/pattern-lope-question"

[pattern]
description = "Take a draft question and rewrite it for `lope ask` — clear context, concrete decision criteria, explicit output format. Validators waste tokens on vague prompts; this pre-processor sharpens them."
model = "gemini-2.5-flash-lite"
vendor = "switchailocal"
strategy_default = "harvey-rigor"

[[pattern.variables]]
name = "input"
description = "Rough draft of the question to ask multiple validators."
kind = "string"
required = true
