[plugin]
name = "pattern-summarize"
version = "0.1.0"
kind = "pattern"
language = "shell"
summary = "Tight 5-bullet summary of any input text"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/pattern-summarize"

[pattern]
description = "Produces a tight 5-bullet summary of any input text. Each bullet starts with a verb, max 15 words. No preamble, no commentary."
model = "gemini-2.5-flash-lite"
vendor = "switchailocal"

[[pattern.variables]]
name = "input"
description = "The text to summarize"
kind = "string"
required = true
