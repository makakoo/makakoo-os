[plugin]
name = "pattern-triage-error"
version = "0.1.0"
kind = "pattern"
language = "shell"
summary = "Stack trace or error log → likely root cause + concrete fix ideas."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/pattern-triage-error"

[pattern]
description = "Triage a stack trace or error log. Returns LIKELY ROOT CAUSE (with confidence), RELEVANT FRAMES (filtered from noise), DIAGNOSTIC STEPS to confirm, and FIX IDEAS. Designed for fast first-pass developer triage."
model = "gemini-2.5-flash-lite"
vendor = "switchailocal"
strategy_default = "harvey-rigor"

[[pattern.variables]]
name = "input"
description = "Stack trace, error message, or log excerpt."
kind = "string"
required = true
