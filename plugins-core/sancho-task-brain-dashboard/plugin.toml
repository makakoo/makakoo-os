[plugin]
name = "sancho-task-brain-dashboard"
version = "0.1.0"
kind = "sancho-task"
language = "python"
summary = "Auto-generate Brain index pages — daily-index, weekly-index, god-nodes"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/sancho-task-brain-dashboard"

[abi]
sancho-task = "^1.0"

[depends]
python = ">=3.9"

[entrypoint]
run = "python3 -u src/tick.py"

[capabilities]
grants = [
    "fs/read:~/MAKAKOO/data/Brain",
    "fs/write:~/MAKAKOO/data/Brain",
    "brain/write",
]

[sancho]
tasks = [{ name = "brain_dashboard", interval = "6h" }]

[state]
dir = "$MAKAKOO_HOME/state/sancho-task-brain-dashboard"
retention = "keep"
