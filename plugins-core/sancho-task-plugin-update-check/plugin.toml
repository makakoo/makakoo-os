[plugin]
name = "sancho-task-plugin-update-check"
version = "0.1.0"
kind = "sancho-task"
language = "python"
summary = "Daily dry-run `plugin outdated` — reports drift to Brain journal. Never auto-updates."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/sancho-task-plugin-update-check"

[abi]
sancho-task = "^1.0"

[depends]
python = ">=3.9"
binaries = ["makakoo"]

[entrypoint]
run = "python3 -u src/tick.py"

[capabilities]
grants = [
    "fs/read:~/MAKAKOO/data/Brain",
    "fs/write:~/MAKAKOO/data/Brain",
    "exec/binary:makakoo",
    "net/http:github.com",
]

[sancho]
tasks = [{ name = "plugin_update_check", interval = "24h" }]

[state]
dir = "$MAKAKOO_HOME/state/sancho-task-plugin-update-check"
retention = "keep"
