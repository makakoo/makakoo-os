[plugin]
name = "skill-ai-ml-grpo-rl-training"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Expert guidance for GRPO/RL fine-tuning with TRL for reasoning and task-specific model training"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-grpo-rl-training"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-grpo-rl-training"
retention = "keep"
