[plugin]
name = "skill-ai-ml-huggingface-hub"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Hugging Face Hub CLI (hf) — search, download, and upload models and datasets, manage repos, query datasets with SQL, deploy inference endpoints, manage Spaces and buckets."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-huggingface-hub"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-huggingface-hub"
retention = "keep"
