[plugin]
name = "skill-ai-ml-pytorch-lightning"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "High-level PyTorch framework with Trainer class, automatic distributed training (DDP/FSDP/DeepSpeed), callbacks system, and minimal boilerplate. Scales from laptop to supercomputer with same code. Use when you want clean training loops with built-in best practices."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-pytorch-lightning"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-pytorch-lightning"
retention = "keep"
