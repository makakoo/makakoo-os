[plugin]
name = "skill-ai-ml-segment-anything"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Foundation model for image segmentation with zero-shot transfer. Use when you need to segment any object in images using points, boxes, or masks as prompts, or automatically generate all object masks in an image."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-segment-anything"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-segment-anything"
retention = "keep"
