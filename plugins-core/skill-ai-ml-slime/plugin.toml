[plugin]
name = "skill-ai-ml-slime"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Provides guidance for LLM post-training with RL using slime, a Megatron+SGLang framework. Use when training GLM models, implementing custom data generation workflows, or needing tight Megatron-LM integration for RL scaling."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-slime"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-slime"
retention = "keep"
