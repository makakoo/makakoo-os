[plugin]
name = "skill-ai-ml-superbrain"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when querying Harvey's unified knowledge layer — searches Brain pages, journals, multimodal documents, and events across Qdrant + PostgreSQL + filesystem in parallel."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-superbrain"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-superbrain"
retention = "keep"
