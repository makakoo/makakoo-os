[plugin]
name = "skill-ai-ml-torchtitan"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Provides PyTorch-native distributed LLM pretraining using torchtitan with 4D parallelism (FSDP2, TP, PP, CP). Use when pretraining Llama 3.1, DeepSeek V3, or custom models at scale from 8 to 512+ GPUs with Float8, torch.compile, and distributed checkpointing."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-ai-ml-torchtitan"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-ai-ml-torchtitan"
retention = "keep"
