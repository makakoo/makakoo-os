[plugin]
name = "skill-blockchain-base"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Query Base (Ethereum L2) blockchain data with USD pricing — wallet balances, token info, transaction details, gas analysis, contract inspection, whale detection, and live network stats. Uses Base RPC + CoinGecko. No API key required."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-blockchain-base"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-blockchain-base"
retention = "keep"
