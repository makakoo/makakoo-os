[plugin]
name = "skill-blockchain-polymarket"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when you need to query Polymarket prediction market data — search markets, get prices, orderbooks, and price history. Read-only via public REST APIs, no API key needed."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-blockchain-polymarket"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.blockchain.polymarket"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-blockchain-polymarket"
retention = "keep"
