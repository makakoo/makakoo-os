[plugin]
name = "skill-career-career-manager"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "The master operating manual for Harvey's Autonomous Career Agent. Handles lead curation, CRM staging, high-conversion pitching, and inbox monitoring."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-career-career-manager"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-career-career-manager"
retention = "keep"
