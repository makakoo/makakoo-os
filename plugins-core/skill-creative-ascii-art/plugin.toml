[plugin]
name = "skill-creative-ascii-art"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Generate ASCII art using pyfiglet (571 fonts), cowsay, boxes, toilet, image-to-ascii, remote APIs (asciified, ascii.co.uk), and LLM fallback. No API keys required."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-ascii-art"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.creative.ascii-art"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-ascii-art"
retention = "keep"
