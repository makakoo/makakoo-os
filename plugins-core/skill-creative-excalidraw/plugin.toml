[plugin]
name = "skill-creative-excalidraw"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Create hand-drawn style diagrams using Excalidraw JSON format. Generate .excalidraw files for architecture diagrams, flowcharts, sequence diagrams, concept maps, and more. Files can be opened at excalidraw.com or uploaded for shareable links."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-excalidraw"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.creative.excalidraw"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-excalidraw"
retention = "keep"
