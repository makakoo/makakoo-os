[plugin]
name = "skill-creative-gif-search"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Search and download GIFs from Tenor using curl. No dependencies beyond curl and jq. Useful for finding reaction GIFs, creating visual content, and sending GIFs in chat."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-gif-search"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-gif-search"
retention = "keep"
