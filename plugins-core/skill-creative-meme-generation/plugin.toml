[plugin]
name = "skill-creative-meme-generation"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Generate real meme images by picking a template and overlaying text with Pillow. Produces actual .png meme files."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-meme-generation"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.creative.meme-generation"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-meme-generation"
retention = "keep"
