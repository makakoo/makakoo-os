[plugin]
name = "skill-creative-songsee"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Generate spectrograms and audio feature visualizations (mel, chroma, MFCC, tempogram, etc.) from audio files via CLI. Useful for audio analysis, music production debugging, and visual documentation."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-songsee"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-songsee"
retention = "keep"
