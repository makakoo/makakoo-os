[plugin]
name = "skill-creative-youtube-content"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Fetch YouTube video transcripts and transform them into structured content (chapters, summaries, threads, blog posts)."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-creative-youtube-content"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-creative-youtube-content"
retention = "keep"
