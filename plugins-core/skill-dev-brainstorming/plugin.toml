[plugin]
name = "skill-dev-brainstorming"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "You MUST use this before any creative work - creating features, building components, adding functionality, or modifying behavior. Explores user intent, requirements and design before implementation."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-brainstorming"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-brainstorming"
retention = "keep"
