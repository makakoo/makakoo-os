[plugin]
name = "skill-dev-dev-orchestrator"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when Sebastian says 'build X', 'implement Y', or any multi-component development request that can be parallelized across independent tasks"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-dev-orchestrator"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/orchestrate.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-dev-orchestrator"
retention = "keep"
