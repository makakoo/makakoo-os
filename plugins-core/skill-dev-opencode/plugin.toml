[plugin]
name = "skill-dev-opencode"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Delegate coding tasks to OpenCode CLI agent for feature implementation, refactoring, PR review, and long-running autonomous sessions. Requires the opencode CLI installed and authenticated."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-opencode"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-opencode"
retention = "keep"
