[plugin]
name = "skill-dev-plan"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Plan mode for Hermes — inspect context, write a markdown plan into the active workspace's `.hermes/plans/` directory, and do not execute the work."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-plan"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-plan"
retention = "keep"
