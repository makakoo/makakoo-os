[plugin]
name = "skill-dev-requesting-code-review"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when completing tasks, implementing major features, or before merging to verify work meets requirements"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-requesting-code-review"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-requesting-code-review"
retention = "keep"
