[plugin]
name = "skill-dev-skill-manager"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Create, patch, edit, delete, and manage Harvey OS skills. Use when building new skills from successful approaches, fixing skill issues during use, or maintaining the skill library."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-dev-skill-manager"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/skill_manager.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-dev-skill-manager"
retention = "keep"
