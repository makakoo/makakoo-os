[plugin]
name = "skill-infrastructure-docker-management"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Manage Docker containers, images, volumes, networks, and Compose stacks — lifecycle ops, debugging, cleanup, and Dockerfile optimization."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-infrastructure-docker-management"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.infrastructure.docker-management"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-infrastructure-docker-management"
retention = "keep"
