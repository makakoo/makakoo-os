[plugin]
name = "skill-infrastructure-github-repo-management"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Clone, create, fork, configure, and manage GitHub repositories. Manage remotes, secrets, releases, and workflows. Works with gh CLI or falls back to git + GitHub REST API via curl."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-infrastructure-github-repo-management"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-infrastructure-github-repo-management"
retention = "keep"
