[plugin]
name = "skill-infrastructure-mcporter"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use the mcporter CLI to list, configure, auth, and call MCP servers/tools directly (HTTP or stdio), including ad-hoc servers, config edits, and CLI/type generation."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-infrastructure-mcporter"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-infrastructure-mcporter"
retention = "keep"
