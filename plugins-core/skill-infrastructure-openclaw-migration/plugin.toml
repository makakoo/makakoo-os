[plugin]
name = "skill-infrastructure-openclaw-migration"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Migrate a user's OpenClaw customization footprint into Hermes Agent. Imports Hermes-compatible memories, SOUL.md, command allowlists, user skills, and selected workspace assets from ~/.openclaw, then reports exactly what could not be migrated and why."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-infrastructure-openclaw-migration"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-infrastructure-openclaw-migration"
retention = "keep"
