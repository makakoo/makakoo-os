[plugin]
name = "skill-lifestyle-openhue"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Control Philips Hue lights, rooms, and scenes via the OpenHue CLI. Turn lights on/off, adjust brightness, color, color temperature, and activate scenes."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-lifestyle-openhue"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-lifestyle-openhue"
retention = "keep"
