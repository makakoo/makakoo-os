[plugin]
name = "skill-lifestyle-pokemon-player"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Play Pokemon games autonomously via headless emulation. Starts a game server, reads structured game state from RAM, makes strategic decisions, and sends button inputs — all from the terminal."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-lifestyle-pokemon-player"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-lifestyle-pokemon-player"
retention = "keep"
