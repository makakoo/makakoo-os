[plugin]
name = "skill-lifestyle-telephony"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Give Hermes phone capabilities without core tool changes. Provision and persist a Twilio number, send and receive SMS/MMS, make direct calls, and place AI-driven outbound calls through Bland.ai or Vapi."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-lifestyle-telephony"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-lifestyle-telephony"
retention = "keep"
