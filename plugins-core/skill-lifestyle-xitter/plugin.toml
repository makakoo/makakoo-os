[plugin]
name = "skill-lifestyle-xitter"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Interact with X/Twitter via the x-cli terminal client using official X API credentials. Use for posting, reading timelines, searching tweets, liking, retweeting, bookmarks, mentions, and user lookups."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-lifestyle-xitter"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-lifestyle-xitter"
retention = "keep"
