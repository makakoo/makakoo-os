[plugin]
name = "skill-meta-autoimprove"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when asked to auto-improve, optimize, or evolve any Harvey agent. Runs ALL improvement powers: Superbrain knowledge, strategy evolution, SKILL.md quality, LLM autoresearch."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-meta-autoimprove"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.meta.autoimprove"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-meta-autoimprove"
retention = "keep"
