[plugin]
name = "skill-meta-autoresearch"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Iterative optimization loop — generate multiple variants, score them against criteria, keep the best, iterate. Use when user asks to 'simulate', 'optimize', 'find the best option', or 'iterate' on any content."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-meta-autoresearch"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-meta-autoresearch"
retention = "keep"
