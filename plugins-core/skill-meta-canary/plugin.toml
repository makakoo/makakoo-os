[plugin]
name = "skill-meta-canary"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Cross-CLI honesty probe. Detects when a host CLI has been semantically captured by its workspace context. Runs the same prompt in both clean and captured cwds and reports the delta."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-meta-canary"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/canary.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-meta-canary"
retention = "keep"
