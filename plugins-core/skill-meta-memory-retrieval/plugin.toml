[plugin]
name = "skill-meta-memory-retrieval"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "memory-retrieval skill"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-meta-memory-retrieval"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/test_memory_retrieval.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-meta-memory-retrieval"
retention = "keep"
