[plugin]
name = "skill-meta-meta-harness"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Use when evaluating or improving Harvey skills via behavioral testing. Based on Stanford IRIS Lab's Meta-Harness (Terminal-Bench 2.0, 76.4% on Claude Opus 4.6). Runs agents in tmux sandboxes."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-meta-meta-harness"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-meta-meta-harness"
retention = "keep"
