[plugin]
name = "skill-productivity-agentmail"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Give the agent its own dedicated email inbox via AgentMail. Send, receive, and manage email autonomously using agent-owned email addresses (e.g. hermes-agent@agentmail.to)."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-agentmail"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-agentmail"
retention = "keep"
