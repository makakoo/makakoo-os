[plugin]
name = "skill-productivity-apple-notes"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Manage Apple Notes via the memo CLI on macOS (create, view, search, edit)."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-apple-notes"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.productivity.apple-notes"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-apple-notes"
retention = "keep"
