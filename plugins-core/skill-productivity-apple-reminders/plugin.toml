[plugin]
name = "skill-productivity-apple-reminders"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Manage Apple Reminders via remindctl CLI (list, add, complete, delete)."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-apple-reminders"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-apple-reminders"
retention = "keep"
