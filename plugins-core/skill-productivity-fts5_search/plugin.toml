[plugin]
name = "skill-productivity-fts5_search"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "fts5_search skill"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-fts5_search"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/indexer.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-fts5_search"
retention = "keep"
