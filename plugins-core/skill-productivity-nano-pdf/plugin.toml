[plugin]
name = "skill-productivity-nano-pdf"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Edit PDFs with natural-language instructions using the nano-pdf CLI. Modify text, fix typos, update titles, and make content changes to specific pages without manual editing."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-nano-pdf"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-nano-pdf"
retention = "keep"
