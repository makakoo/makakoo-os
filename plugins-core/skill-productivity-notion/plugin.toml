[plugin]
name = "skill-productivity-notion"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Notion API for creating and managing pages, databases, and blocks via curl. Search, create, update, and query Notion workspaces directly from the terminal."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-notion"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-notion"
retention = "keep"
