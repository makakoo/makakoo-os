[plugin]
name = "skill-productivity-obsidian"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Read, search, and create notes in the Obsidian vault."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-productivity-obsidian"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m harvey_os.skills.productivity.obsidian"

[capabilities]
# Capability grants default empty — conservative for Phase H.4 batch.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-productivity-obsidian"
retention = "keep"
