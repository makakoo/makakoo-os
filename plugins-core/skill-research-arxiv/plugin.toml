[plugin]
name = "skill-research-arxiv"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Search and retrieve academic papers from arXiv using their free REST API. No API key needed. Search by keyword, author, category, or ID. Combine with web_extract or the ocr-and-documents skill to read full paper content."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-research-arxiv"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-research-arxiv"
retention = "keep"
