[plugin]
name = "skill-research-domain-intel"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Passive domain reconnaissance using Python stdlib. Subdomain discovery, SSL certificate inspection, WHOIS lookups, DNS records, domain availability checks, and bulk multi-domain analysis. No API keys required."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-research-domain-intel"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-research-domain-intel"
retention = "keep"
