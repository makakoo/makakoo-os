[plugin]
name = "skill-research-duckduckgo-search"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Free web search via DuckDuckGo — text, news, images, videos. No API key needed. Use the Python DDGS library or CLI to search, then web_extract for full content."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-research-duckduckgo-search"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-research-duckduckgo-search"
retention = "keep"
