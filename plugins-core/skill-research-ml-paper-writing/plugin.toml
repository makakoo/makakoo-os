[plugin]
name = "skill-research-ml-paper-writing"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Write publication-ready ML/AI papers for NeurIPS, ICML, ICLR, ACL, AAAI, COLM. Use when drafting papers from research repos, structuring arguments, verifying citations, or preparing camera-ready submissions. Includes LaTeX templates, reviewer guidelines, and citation verification workflows."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-research-ml-paper-writing"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-research-ml-paper-writing"
retention = "keep"
