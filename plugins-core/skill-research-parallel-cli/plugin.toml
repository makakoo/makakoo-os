[plugin]
name = "skill-research-parallel-cli"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Optional vendor skill for Parallel CLI — agent-native web search, extraction, deep research, enrichment, FindAll, and monitoring. Prefer JSON output and non-interactive flows."
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-research-parallel-cli"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u -m src.__main__"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-research-parallel-cli"
retention = "keep"
