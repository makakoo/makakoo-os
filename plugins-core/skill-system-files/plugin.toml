[plugin]
name = "skill-system-files"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "files skill"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-system-files"

[abi]
skill = "^1.0"

[depends]
python = ">=3.8"

[entrypoint]
run = "python3 -u src/file_manager.py"

[capabilities]
# Capability grants default empty — conservative for batch migration.
# Add brain/llm/net/state grants manually per skill's real needs.
grants = []

[state]
dir = "$MAKAKOO_HOME/state/skill-system-files"
retention = "keep"
