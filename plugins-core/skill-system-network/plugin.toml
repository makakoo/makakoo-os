[plugin]
name = "skill-system-network"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Interactive network diagnostic wizard — 'Is the internet working?'"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-system-network"

[abi]
skill = "^1.0"

[depends]
plugins = ["lib-hte"]
python = ">=3.8"

[entrypoint]
run = "python3 -u harvey-os/skills/system/network/network_wizard.py"

[capabilities]
grants = [
  "net/http",
  "exec/binary:ping",
]

[state]
dir = "$MAKAKOO_HOME/state/skill-system-network"
retention = "keep"
