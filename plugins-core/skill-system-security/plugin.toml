[plugin]
name = "skill-system-security"
version = "0.1.0"
kind = "skill"
language = "python"
summary = "Security risk wizard — 'Is this command safe?' guided assessment"
authors = ["Makakoo OS contributors"]
license = "MIT"

[source]
path = "plugins-core/skill-system-security"

[abi]
skill = "^1.0"

[depends]
plugins = ["lib-hte"]
python = ">=3.8"

[entrypoint]
run = "python3 -u harvey-os/skills/system/security/security_wizard.py"

[capabilities]
# Pure-logic risk classifier on the fast path. Smart-approval fallback
# (core.security.dangerous_command.smart_approval) optionally calls the
# local switchAI gateway; we declare those grants so the path works
# when triggered without a re-grant prompt.
grants = [
  "net/http:http://localhost:18080/*",
  "secrets/read:SWITCHAI_KEY",
]

[state]
dir = "$MAKAKOO_HOME/state/skill-system-security"
retention = "keep"
