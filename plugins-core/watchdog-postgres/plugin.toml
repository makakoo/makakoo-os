[plugin]
name = "watchdog-postgres"
version = "1.0.0"
kind = "sancho-task"
language = "python"
summary = "Restart Postgres if any cluster is down"
license = "MIT"

[source]
path = "plugins-core/watchdog-postgres"

[abi]
sancho-task = "^1.0"

[depends]
python = ">=3.11"
binaries = ["pg_ctl"]

[install]
unix = "install.sh"
windows = "install.ps1"

[entrypoint]
run = "python3 -u agents/pg-watchdog/pg_watchdog.py"

[capabilities]
grants = [
  "brain/write",
  "exec/binary:pg_ctl",
]

[sancho]
tasks = [{ name = "pg_watchdog", interval = "900s" }]

[state]
dir = "$MAKAKOO_HOME/state/watchdog-postgres"
retention = "purge_on_uninstall"
