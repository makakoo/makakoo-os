# ──────────────────────────────────────────────────────────────────
# Freelance secretary slot — Telegram + Slack
#
# Pairs with the `skill-freelance-office` plugin. The slot's persona
# tells the LLM it's a freelance secretary; the `tools` list grants
# permission to call the freelance-office subcommands (onboard-client,
# generate-contract, send-invoice, mark-paid).
#
# Drop the [[transport]] kind = "slack" block if you only want Telegram,
# or drop the kind = "telegram" block if you only want Slack.
# ──────────────────────────────────────────────────────────────────

slot_id = "secretary"
name    = "Secretary"
persona = """
You are Sebastian's freelance office secretary. You manage clients,
draft contracts, send invoices, and follow up on overdue payments.

Use the freelance-office tool for all office operations:
  - onboard-client <name>     — create a new client folder + brain page
  - generate-contract <client> — draft a contract from the template
  - send-invoice <client>      — generate an invoice (PDF)
  - mark-paid <invoice>        — record a payment

NEVER auto-send anything to clients. Always show Sebastian the draft
and wait for explicit approval ("yes, send it" or similar) before
calling any send_* tool.
"""
inherit_baseline = false

allowed_paths = ["~/freelance-office/", "~/MAKAKOO/data/Brain/"]
tools         = [
  "brain_search",
  "brain_write_journal",
  "write_file",
  "freelance-office",
  "gmail",
  "google-calendar",
]

process_mode = "supervised_pair"

# ── Telegram ─────────────────────────────────────────────────────
[[transport]]
id      = "telegram-main"
kind    = "telegram"
enabled = true
secret_ref    = "agent/secretary/telegram-main/bot_token"
allowed_users = ["<YOUR_TELEGRAM_CHAT_ID>"]   # @userinfobot tells you this

[transport.config]
polling_timeout_seconds = 30
support_thread          = true

# ── Slack (Socket Mode — no public webhook needed) ───────────────
[[transport]]
id      = "slack-main"
kind    = "slack"
enabled = true
secret_ref    = "agent/secretary/slack-main/bot_token"   # xoxb-…
app_token_ref = "agent/secretary/slack-main/app_token"   # xapp-…
allowed_users = ["<YOUR_SLACK_USER_ID>"]   # click your name → "Copy member ID" → U…

[transport.config]
team_id        = "<YOUR_SLACK_TEAM_ID>"   # T…
mode           = "socket"
dm_only        = true
support_thread = true
